name: Harvest Airtable CSV

on:
  push:
    branches:
      - main

  schedule:
    # GitHub cron runs in UTC.
    # Testing mode: runs every 10 minutes, every day including weekends.
    - cron: "3,13,23,33,43,53 * * * *"

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AIRTABLE_SHARED_URL: ${{ secrets.AIRTABLE_SHARED_URL }}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sg-dashboard-harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest

    steps:
      - name: Show trigger info
        run: |
          echo "Workflow triggered"
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "UTC time:"
          date -u
          echo "Runner local time:"
          date

      - name: Check out repo
        uses: actions/checkout@v4

      - name: Show repo files
        run: |
          echo "Repo root files:"
          ls -la
          echo ""
          echo "Scripts folder:"
          ls -la scripts || true
          echo ""
          echo "Data folder:"
          ls -la data || true

      - name: Confirm Airtable URL secret exists
        run: |
          if [ -z "$AIRTABLE_SHARED_URL" ]; then
            echo "AIRTABLE_SHARED_URL is missing or empty"
            exit 1
          else
            echo "AIRTABLE_SHARED_URL is set"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas playwright beautifulsoup4 requests pytz
          fi

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Harvest Airtable CSV
        run: |
          python scripts/harvest_airtable.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected. Already harvested or Airtable data unchanged."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git status --short
          fi

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update Airtable harvest"
          git push

      - name: Setup Pages
        if: steps.changes.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
