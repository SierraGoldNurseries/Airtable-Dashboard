name: Harvest Airtable CSV

on:
  schedule:
    # GitHub cron runs in UTC.
    # Testing mode: wakes up every 10 minutes, every day including weekends.
    # Your Python script should still skip if data was already harvested.
    - cron: "*/10 * * * *"

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sg-dashboard-harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas playwright beautifulsoup4 requests pytz

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Harvest Airtable CSV
        run: |
          python harvest_airtable.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected. Already harvested or Airtable data unchanged."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected."
          fi

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update Airtable harvest"
          git push

      - name: Setup Pages
        if: steps.changes.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
