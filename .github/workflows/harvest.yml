name: Harvest Airtable CSV

on:
  schedule:
    # GitHub cron runs in UTC.
    # This broad window lets the Python script enforce the exact Pacific times:
    # Monday-Friday at 6 AM, 10 AM, and 2 PM Pacific, with PST/PDT handled by the script.
    - cron: "0 13-22 * * 1-5"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sg-dashboard-harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run harvester
        env:
          AIRTABLE_SHARED_URL: ${{ secrets.AIRTABLE_SHARED_URL }}
        run: |
          python scripts/harvest_airtable.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data
          git diff --cached --quiet || git commit -m "Update SG dashboard data"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
